<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数学可视化合集</title>
  <link rel="stylesheet" href="shared/style.css" />
</head>
<body>
  <main class="home">
    <h1>数学可视化合集</h1>
    <p class="lead">用交互式图像理解数学概念。拖一拖、调一调,看公式背后的几何意义。</p>

    <div class="grid">
      <a class="card" href="demos/what-is-nn/index.html">
        <span class="tag">神经网络</span>
        <h2>什么是神经网络</h2>
        <p>在浏览器里现场训练一个迷你网络识别手写数字,亲眼看它从瞎猜到学会。</p>
      </a>

      <a class="card" href="demos/dot-product/index.html">
        <span class="tag">线性代数</span>
        <h2>向量加法 · 点积</h2>
        <p>拖动两个向量,实时看加法、夹角,以及点积的几何意义——投影。</p>
      </a>

      <a class="card soon">
        <span class="tag">回归</span>
        <h2>最小二乘法</h2>
        <p>散点拟合一条直线,看残差平方和如何被最小化。(规划中)</p>
      </a>

      <a class="card soon">
        <span class="tag">微积分</span>
        <h2>微分 · 导数</h2>
        <p>割线逼近切线,看导数作为瞬时变化率的含义。(规划中)</p>
      </a>
    </div>
  </main>
</body>
</html>
